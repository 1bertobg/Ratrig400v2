
#############################################################################################################
### CONFIGURATION GENERATED BY THE RATOS CONFIGURATOR
#############################################################################################################
[include RatOS.cfg]
[exclude_object]
[include timelapse.cfg]
[include macros.cfg]
#[include bigtreetech-mms/mms/mms.cfg]

#############################################################################################################
### MACRO CONFIGURATION
### Configure the behavior of RatOS macros
### See: https://os.ratrig.com/docs/configuration/macros
#############################################################################################################
[gcode_macro RatOS]
variable_relative_extrusion: False
variable_preheat_extruder: True
variable_calibrate_bed_mesh: True
variable_nozzle_priming: "primeblob"
variable_nozzle_prime_start_x: "min" 
variable_start_print_park_in: "back"
variable_start_print_park_z_height: 50
variable_end_print_park_in: "back"
variable_pause_print_park_in: "front"
# set to "front" to park in the front, or "center" to park in the center.
variable_skew_profile: "my_skew"     
#variable_macro_travel_speed: 300
#variable_macro_travel_accel: 3800


#############################################################################################################
### USER OVERRIDES & CUSTOM CONFIGURATION
### Anything custom you want to add, or RatOS configuration you want to override, do it here.
### This section is pre-populated with the most common settings you may want to change.
### See: https://os.ratrig.com/docs/configuration/includes-and-overrides
###
### It is recommended that you follow these steps to properly calibrate your printer:
### 0) Sanity check and PID Tuning: https://www.klipper3d.org/Config_checks.html
### 1) Z-offset calibration: Follow along from step 6 in the official beacon guide
###    https://docs.beacon3d.com/quickstart/#6-calibrate-beacon
### 2) Pressure Advance: https://www.klipper3d.org/Pressure_Advance.html
### 3) Skew Correction: https://www.klipper3d.org/Skew_Correction.html
### 4) Resonance Compensation: https://www.klipper3d.org/Resonance_Compensation.html
### RatOS has dedicated macro's to generate shaper graphs for deeper analysis (requires accelerometer).
### Use MEASURE_COREXY_BELT_TENSION to compare tension between belts, and use
### GENERATE_SHAPER_GRAPHS to generate the resonance graphs for analysing and manually entering input shaper
### configuration.
### You can run SHAPER_CALIBRATE to automatically calibrate your input shaper configuration, if you just want
### to get started.
### Additionally, you can use the Realtime Analysis Tool to analyze your printer's performance in real-time.
### Read more about klipper here: https://www.klipper3d.org/Overview.html
#############################################################################################################

#############################################################################################################
### Autotune tmc
#############################################################################################################
[motor_constants ldo-42sth60-3004ah]
resistance: 1
inductance: 0.0016
holding_torque: 0.8
max_current: 3.0
steps_per_revolution: 200

[motor_constants ACC01STM41280]
# Coil resistance, Ohms
resistance: 2.37
# Coil inductance, Henries
inductance: 0.0012
# Holding torque, Nm
holding_torque: 0.093163175
# Nominal rated current, Amps
max_current: 0.8
# Steps per revolution (1.8deg motors use 200, 0.9deg motors use 400)
steps_per_revolution: 200

[autotune_tmc stepper_x]
motor: ldo-42sth60-3004ah

[autotune_tmc stepper_y]
motor: ldo-42sth60-3004ah

[autotune_tmc extruder]
motor: ACC01STM41280

#---------------------------------------------------- X -----------------------------------------------------
# The A motor in the CoreXY system, located at the rear left of the printer
#------------------------------------------------------------------------------------------------------------
[tmc2209 stepper_x]
stealthchop_threshold = 0
interpolate = true
uart_pin = PC4
run_current = 1.6
driver_tbl = 2
driver_toff = 3
driver_hend = 0
driver_hstrt = 6
sense_resistor = 0.11

[stepper_x]
dir_pin: x_dir_pin                 # Add ! in front of pin name to reverse the direction of stepper_x
rotation_distance: 40              # 40 for 20 tooth 2GT pulleys, 32 for 16 tooth 2GT pulleys
homing_speed: 50
position_min: 0
position_max: 400
position_endstop: 0

#---------------------------------------------------- Y -----------------------------------------------------
# The B motor in the CoreXY system, located at the rear right of the printer
#------------------------------------------------------------------------------------------------------------
[tmc2209 stepper_y]
stealthchop_threshold = 0
interpolate = true
uart_pin = PD11
run_current = 1.6
driver_tbl = 2
driver_toff = 3
driver_hend = 0
driver_hstrt = 6
sense_resistor = 0.11

[stepper_y]
dir_pin: y_dir_pin                 # Add ! in front of pin name to reverse the direction of stepper_y
rotation_distance: 40              # 40 for 20 tooth 2GT pulleys, 32 for 16 tooth 2GT pulleys
homing_speed: 50
position_min: 0
position_max: 400
position_endstop: 400

#---------------------------------------------------- Z -----------------------------------------------------
# The left Z motor for the kinematic bed
#------------------------------------------------------------------------------------------------------------
[stepper_z]
dir_pin: !z0_dir_pin               # Remove ! in front of pin name to reverse the direction of stepper_z
rotation_distance: 4               # 4 for TR8*4 lead screws
homing_speed: 10
position_min: -5
position_max: 390

#---------------------------------------------------- Z1 ----------------------------------------------------
# The rear Z motor for the kinematic bed
#------------------------------------------------------------------------------------------------------------
[stepper_z1]
dir_pin: !z1_dir_pin               # Remove ! in front of pin name to reverse the direction of stepper_z1
rotation_distance: 4               # 4 for TR8*4 lead screws

#---------------------------------------------------- Z2 ----------------------------------------------------
# The right Z motor for the kinematic bed
#------------------------------------------------------------------------------------------------------------
[stepper_z2]
dir_pin: !z2_dir_pin               # Remove ! in front of pin name to reverse the direction of stepper_z2
rotation_distance: 4               # 4 for TR8*4 lead screws

#------------------------------------------------- EXTRUDER -------------------------------------------------
# The extruder motor used for pushing filament through the toolhead
#------------------------------------------------------------------------------------------------------------
[tmc2209 extruder]
stealthchop_threshold = 0
interpolate = true
uart_pin = toolboard_t0:PA15
run_current = 0.707
driver_tbl = 0
driver_toff = 4
driver_hend = 6
driver_hstrt = 7
sense_resistor = 0.11

[extruder]
dir_pin: toolboard_t0:e_dir_pin   # Remove ! in front of pin name to reverse the direction of extruder
rotation_distance: 3.8433         # Bondtech LGX Lite pro (Tunning)
pressure_advance: 0.01            # Check https://www.klipper3d.org/Pressure_Advance.html for pressure advance tuning.
max_temp: 310

# valor que marquem pra extrair - o valor que ficou a faltar extrair = valor extraido
#100 - 32.13 = 67.87
#67.87/100 = 0,6787

#rotation_distance = <previous_rotation_distance> * <actual_extruder_rotation_distance> / <100>
#rotation_distance = 5.57 * <microsteps> / <100>
# 5.57 * 0,6787 = 3,780359

#rotation_distance: 4.0

#[tmc2209 extruder]
#run_current: 0.650

#control: pid
#pid_kp: 28.413
#pid_ki: 1.334
#pid_kd: 151.300

[heater_bed]
#control: pid
#pid_Kp: 22.2
#pid_Ki: 1.08
#pid_Kd: 114

# TODO: remove when automatically calculated by configurator
[bed_mesh]
speed: 300
mesh_min: 30,30
mesh_max: 370,350
probe_count: 30,30

[z_tilt]
points:
    30,30
    200,350
    360,30
    
#############################################################################################################
### FANS
#############################################################################################################
# Part cooling fan
[fan]
# 4-pin fan connected to 2-pin header on T0 (EBB36 v1.2) - digital pwm
pin: toolboard_t0:PA0
#cycle_time:0.01
#cycle_time: 0.00004
cycle_time: 0.0166

# Hotend cooling fan
[heater_fan toolhead_cooling_fan]
heater: extruder
# 4-pin fan connected to 2-pin header on T0 (EBB36 v1.2) - digital pwm
pin: toolboard_t0:PA1
cycle_time:  0.00004

# Controller cooling fan
[controller_fan controller_fan]
# 4-pin fan connected to 2-pin header on Octopus V1.1 F446 - digital pwm
pin: PD12
cycle_time:  0.00004


#############################################################################################################
### RELAY MAIN POWER
#############################################################################################################
[mcu rpi]
serial: /tmp/klipper_host_mcu

[output_pin Main_Power]
pin: !rpi:gpio17
value: 1
shutdown_value: 0

#############################################################################################################
### LED
### Pick your daylight
#############################################################################################################
[multi_pin barleds]
pins: PB10, PB11

[led printer_leds]
white_pin: multi_pin:barleds
#   The pin controlling the given LED color. At least one of the above
#   parameters must be provided.
#cycle_time: 0.01
cycle_time: 0.0025	#fast-ish cycle time
#   The amount of time (in seconds) per PWM cycle. It is recommended
#   this be 10 milliseconds or greater when using software based PWM.
#   The default is 0.010 seconds.
hardware_pwm: True
#   Enable this to use hardware PWM instead of software PWM. When
#   using hardware PWM the actual cycle time is constrained by the
#   implementation and may be significantly different than the
#   requested cycle_time. The default is False.
initial_WHITE: 0.1
#   Sets the initial LED color. Each value should be between 0.0 and
#   1.0. The default for each color is 0.
 
[gcode_macro led_on]
description: turn the LED on
gcode:
	SET_PIN PIN=printer_leds initial_WHITE=0.1     #adjust value for designed brightness
 
[gcode_macro led_off]
description: turn the LED off
gcode:
	SET_PIN PIN=printer_leds initial_WHITE=0		#set value to 0
    

#############################################################################################################
### Slicer
#############################################################################################################
[gcode_arcs]
#resolution: 1.0
#   An arc will be split into segments. Each segment's length will
#   equal the resolution in mm set above. Lower values will produce a
#   finer arc, but also more work for your machine. Arcs smaller than
#   the configured value will become straight lines. The default is
#   1mm.

[gcode_macro _ON_LAYER_CHANGE]
gcode:
    SET_PRINT_STATS_INFO CURRENT_LAYER={params.LAYER|int}
#Por causa do erro que apareceu _ON_LAYER_CHANGE

[ratos]
allow_unsupported_slicer_versions: True
#bypass_post_processing: True

#############################################################################################################
### SERVO
### https://www.printables.com/model/383195-vcore-nozzle-wiper
#############################################################################################################
[servo servo_cutter]
pin: PB0
#   PWM output pin controlling the servo. This parameter must be
#   provided.
maximum_servo_angle: 180
#   The maximum angle (in degrees) that this servo can be set to. The
#   default is 180 degrees.
minimum_pulse_width: 0.0005
#   The minimum pulse width time (in seconds). This should correspond
#   with an angle of 0 degrees. The default is 0.001 seconds.
maximum_pulse_width: 0.0025
#   The maximum pulse width time (in seconds). This should correspond
#   with an angle of maximum_servo_angle. The default is 0.002
#   seconds.
initial_angle: 2
#   Initial angle (in degrees) to set the servo to. The default is to
#   not send any signal at startup.
#initial_pulse_width: 0.0025
#   Initial pulse width time (in seconds) to set the servo to. (This
#   is only valid if initial_angle is not set.) The default is to not
#   send any signal at startup.

